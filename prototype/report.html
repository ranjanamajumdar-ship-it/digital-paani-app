<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Report Issue · Digital Paani</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: {
    fontFamily: { sans: ['Inter','ui-sans-serif','system-ui','sans-serif'] },
    colors: { ink:{900:'#0B1220',700:'#2B3344',500:'#6B7280',400:'#9AA3B2',300:'#D6DBE3',200:'#EAEDF2',100:'#F4F6F9'}, crit:'#E11D2E', warn:'#F59E0B', prog:'#2563EB', ok:'#16A34A', paper:'#FAFAF7' },
    boxShadow: { card:'0 1px 0 rgba(11,18,32,.04), 0 6px 18px rgba(11,18,32,.05)', line:'inset 0 0 0 1px #ECEEF2' },
    keyframes: { softpulse:{'0%':{boxShadow:'0 0 0 0 rgba(225,29,46,.55)'},'70%':{boxShadow:'0 0 0 10px rgba(225,29,46,0)'},'100%':{boxShadow:'0 0 0 0 rgba(225,29,46,0)'}} },
    animation: { softpulse:'softpulse 1.6s ease-out infinite' }
  } } };
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_shared.css"/>
<style>
  .opt { transition:all .15s ease; }
  .opt.selected { background:#0B1220; color:#fff; border-color:#0B1220; }
  .sev.selected[data-sev="high"] { background:#E11D2E; border-color:#E11D2E; color:#fff; }
  .sev.selected[data-sev="med"]  { background:#F59E0B; border-color:#F59E0B; color:#fff; }
  .sev.selected[data-sev="low"]  { background:#0B1220; border-color:#0B1220; color:#fff; }
  .req::after { content:'•'; color:#E11D2E; margin-left:4px; font-size:14px; line-height:1; }
</style>
</head>
<body class="font-sans text-ink-900 antialiased">
<div class="w-full flex items-start justify-center p-6 lg:p-12 gap-10">

  <aside class="hidden lg:flex flex-col w-56 sticky top-12 gap-2">
    <div class="text-[10px] uppercase tracking-[.18em] text-ink-500 font-semibold">Digital Paani · Prototype</div>
    <a href="plant.html" class="tap rounded-xl bg-white shadow-line px-3 py-2.5 text-[12px] font-semibold flex items-center justify-between">Plant <span class="text-ink-400">SCADA</span></a>
    <a href="tasks.html" class="tap rounded-xl bg-white shadow-line px-3 py-2.5 text-[12px] font-semibold flex items-center justify-between">Tasks <span class="text-ink-400">Kanban</span></a>
    <a href="issues.html" class="tap rounded-xl bg-white shadow-line px-3 py-2.5 text-[12px] font-semibold flex items-center justify-between">Issues <span class="text-ink-400">List</span></a>
    <a href="logbook.html" class="tap rounded-xl bg-white shadow-line px-3 py-2.5 text-[12px] font-semibold flex items-center justify-between">Logbook <span class="text-ink-400">Bulk</span></a>
    <a href="equipment.html" class="tap rounded-xl bg-white shadow-line px-3 py-2.5 text-[12px] font-semibold flex items-center justify-between">Equipment <span class="text-ink-400">Card</span></a>
    <a href="report.html" class="tap rounded-xl bg-ink-900 text-white px-3 py-2.5 text-[12px] font-semibold flex items-center justify-between">Report <span class="opacity-60">New</span></a>
  </aside>

  <div class="device">
    <div class="notch"></div>
    <div class="absolute top-0 left-0 right-0 h-12 z-50 flex items-center justify-between px-7 pt-3 text-[12px] font-semibold">
      <span>9:41</span>
      <span class="flex items-center gap-1.5">
        <svg width="16" height="10" viewBox="0 0 16 10" fill="currentColor"><rect x="0" y="6" width="3" height="4" rx="1"/><rect x="4.5" y="4" width="3" height="6" rx="1"/><rect x="9" y="2" width="3" height="8" rx="1"/><rect x="13.5" y="0" width="3" height="10" rx="1"/></svg>
        <svg width="22" height="10" viewBox="0 0 22 10" fill="none"><rect x=".5" y=".5" width="18" height="9" rx="2" stroke="currentColor"/><rect x="2" y="2" width="15" height="6" rx="1" fill="currentColor"/><rect x="19.5" y="3.5" width="1.5" height="3" rx=".5" fill="currentColor"/></svg>
      </span>
    </div>

    <main class="absolute inset-0 pt-12 pb-44 overflow-y-auto">
      <!-- Header -->
      <div class="px-5 pt-3 pb-2 flex items-center gap-3">
        <a href="plant.html" class="tap w-9 h-9 rounded-full bg-white shadow-line grid place-items-center">
          <svg class="w-4 h-4 text-ink-700" viewBox="0 0 20 20" fill="none"><path d="M13 4l-6 6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </a>
        <div class="flex-1 min-w-0">
          <div class="text-[11px] uppercase tracking-[.16em] text-ink-500 font-semibold">Report Issue</div>
          <h2 class="text-[18px] font-bold leading-tight mt-0.5">Naya issue darj karein</h2>
        </div>
      </div>

      <!-- Alarm Bar -->
      <div class="px-5 mt-2">
        <a href="plant.html" class="tap block w-full text-left rounded-2xl shadow-card overflow-hidden bg-crit text-white animate-softpulse">
          <div class="px-4 py-3 flex items-center gap-3">
            <span class="grid place-items-center w-7 h-7 rounded-full bg-white/15">
              <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none"><path d="M12 3l9 16H3l9-16Z" stroke="white" stroke-width="2" stroke-linejoin="round"/><path d="M12 10v4" stroke="white" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="17" r="1" fill="white"/></svg>
            </span>
            <div class="flex-1 min-w-0">
              <div class="text-[11px] uppercase tracking-wider opacity-80 font-semibold">Active · Blower #2</div>
              <div class="text-[14px] font-semibold truncate">High vibration — diagnosing</div>
            </div>
            <svg class="w-4 h-4 opacity-80" viewBox="0 0 20 20" fill="none"><path d="M7 4l6 6-6 6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </a>
      </div>

      <section class="px-5 mt-3 space-y-3">

        <!-- Equipment -->
        <div class="rounded-2xl bg-white shadow-card p-4">
          <div class="text-[10.5px] uppercase tracking-wider font-bold text-ink-500 mb-2 req inline-block">Equipment</div>
          <div class="grid grid-cols-3 gap-1.5" data-group="eq">
            <button class="opt rounded-lg border border-ink-200 bg-white py-2 text-[11.5px] font-semibold">Inlet</button>
            <button class="opt rounded-lg border border-ink-200 bg-white py-2 text-[11.5px] font-semibold">Bar Screen</button>
            <button class="opt rounded-lg border border-ink-200 bg-white py-2 text-[11.5px] font-semibold">Equalization</button>
            <button class="opt rounded-lg border border-ink-200 bg-white py-2 text-[11.5px] font-semibold">Aeration</button>
            <button class="opt rounded-lg border border-ink-200 bg-white py-2 text-[11.5px] font-semibold">Clarifier</button>
            <button class="opt rounded-lg border border-ink-200 bg-white py-2 text-[11.5px] font-semibold">MBBR</button>
            <button class="opt rounded-lg border border-ink-200 bg-white py-2 text-[11.5px] font-semibold">Outlet</button>
            <button class="opt rounded-lg border border-ink-200 bg-white py-2 text-[11.5px] font-semibold">Blower</button>
            <button class="opt rounded-lg border border-ink-200 bg-white py-2 text-[11.5px] font-semibold">Pump</button>
          </div>
        </div>

        <!-- Severity -->
        <div class="rounded-2xl bg-white shadow-card p-4">
          <div class="text-[10.5px] uppercase tracking-wider font-bold text-ink-500 mb-2 req inline-block">Severity</div>
          <div class="grid grid-cols-3 gap-1.5" data-group="sev">
            <button class="opt sev rounded-lg border border-ink-200 bg-white py-2.5 text-[12px] font-semibold flex items-center justify-center gap-1.5" data-sev="high"><span class="w-1.5 h-1.5 rounded-full bg-crit"></span>High</button>
            <button class="opt sev rounded-lg border border-ink-200 bg-white py-2.5 text-[12px] font-semibold flex items-center justify-center gap-1.5" data-sev="med"><span class="w-1.5 h-1.5 rounded-full bg-warn"></span>Medium</button>
            <button class="opt sev rounded-lg border border-ink-200 bg-white py-2.5 text-[12px] font-semibold flex items-center justify-center gap-1.5" data-sev="low"><span class="w-1.5 h-1.5 rounded-full bg-ink-400"></span>Low</button>
          </div>
        </div>

        <!-- Description -->
        <div class="rounded-2xl bg-white shadow-card p-4">
          <div class="text-[10.5px] uppercase tracking-wider font-bold text-ink-500 mb-2">Kya hua?</div>
          <textarea id="desc" rows="3" placeholder="Issue ka short description likhein..." class="w-full rounded-lg border border-ink-200 bg-paper px-3 py-2 text-[13px] outline-none focus:border-ink-900 resize-none" oninput="evalForm()"></textarea>
          <div class="mt-2 flex flex-wrap gap-1.5" data-group="hint">
            <button class="opt text-[10.5px] font-medium px-2 py-1 rounded-full border border-ink-200 bg-white" onclick="appendDesc('Strange noise')">Strange noise</button>
            <button class="opt text-[10.5px] font-medium px-2 py-1 rounded-full border border-ink-200 bg-white" onclick="appendDesc('Leak detected')">Leak detected</button>
            <button class="opt text-[10.5px] font-medium px-2 py-1 rounded-full border border-ink-200 bg-white" onclick="appendDesc('Odor / smell')">Odor</button>
            <button class="opt text-[10.5px] font-medium px-2 py-1 rounded-full border border-ink-200 bg-white" onclick="appendDesc('Visual abnormal')">Visual</button>
          </div>
        </div>

        <!-- Photo (required) -->
        <div class="rounded-2xl bg-white shadow-card p-4">
          <div class="flex items-center gap-2 mb-2">
            <div class="text-[10.5px] uppercase tracking-wider font-bold text-ink-500 req inline-block">Photo proof</div>
            <span class="text-[10px] font-semibold text-ink-500">Required</span>
          </div>
          <input type="file" accept="image/*" capture="environment" id="rphoto" class="hidden" onchange="onRPhoto(event)"/>
          <div id="rempty">
            <button class="tap w-full rounded-xl border border-dashed border-ink-300 bg-paper py-7 flex flex-col items-center gap-1.5" onclick="document.getElementById('rphoto').click()">
              <span class="w-12 h-12 rounded-full bg-white shadow-line grid place-items-center">
                <svg class="w-6 h-6 text-ink-700" viewBox="0 0 24 24" fill="none"><path d="M4 8a2 2 0 0 1 2-2h2l1.5-2h5L16 6h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V8Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><circle cx="12" cy="12.5" r="3.5" stroke="currentColor" stroke-width="1.6"/></svg>
              </span>
              <span class="text-[13px] font-semibold mt-1">Open Camera</span>
              <span class="text-[10.5px] text-ink-500">or tap to upload</span>
            </button>
          </div>
          <div id="rprev" class="hidden relative rounded-xl overflow-hidden bg-ink-200">
            <img id="rimg" alt="" class="w-full h-44 object-cover"/>
            <button class="tap absolute top-2 right-2 w-8 h-8 rounded-full bg-ink-900/85 text-white grid place-items-center" onclick="clearRPhoto()" aria-label="Remove">
              <svg class="w-3.5 h-3.5" viewBox="0 0 20 20" fill="none"><path d="M5 5l10 10M15 5L5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            </button>
            <div class="absolute left-2 bottom-2 text-[10px] font-semibold text-white bg-black/60 rounded-md px-2 py-1">Captured · 9:42 AM</div>
          </div>
        </div>

      </section>
      <div class="h-3"></div>
    </main>

    <!-- Sticky Submit footer -->
    <div class="absolute left-0 right-0 bottom-[96px] z-50 px-3">
      <button id="rsubmit" disabled class="tap w-full rounded-2xl bg-ink-300 text-white font-semibold py-3.5 text-[14px] shadow-pop flex items-center justify-center gap-2" onclick="submitReport()">
        Submit Issue
        <svg class="w-4 h-4" viewBox="0 0 20 20" fill="none"><path d="M7 4l6 6-6 6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <!-- Bottom Nav -->
    <nav class="absolute left-0 right-0 bottom-0 z-40">
      <div class="mx-3 mb-3 rounded-2xl bg-white shadow-card shadow-line px-2 py-2 flex items-center justify-between">
        <a href="issues.html" class="tap flex-1 flex flex-col items-center py-1.5 gap-0.5 text-ink-500">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none"><path d="M12 3l9 7v10a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1V10l9-7Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>
          <span class="text-[10px] font-medium">Issues</span>
        </a>
        <a href="tasks.html" class="tap flex-1 flex flex-col items-center py-1.5 gap-0.5 text-ink-500">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none"><rect x="4" y="5" width="16" height="15" rx="2" stroke="currentColor" stroke-width="1.7"/><path d="M8 3v4M16 3v4M4 10h16" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M9 14l2 2 4-4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="text-[10px] font-medium">Tasks</span>
        </a>
        <a href="plant.html" class="tap flex-1 flex flex-col items-center py-1.5 gap-0.5 text-ink-500">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none"><path d="M3 12c2 0 2-3 5-3s3 3 5 3 2-3 5-3 3 3 3 3v8H3v-8Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/><circle cx="12" cy="6" r="2.2" stroke="currentColor" stroke-width="1.7"/></svg>
          <span class="text-[10px] font-medium">Plant</span>
        </a>
        <a href="report.html" class="tap flex-1 flex flex-col items-center py-1.5 gap-0.5 text-ink-900 relative">
          <span class="absolute -top-0.5 w-8 h-1 rounded-full bg-ink-900"></span>
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.7"/><path d="M12 8v8M8 12h8" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
          <span class="text-[10px] font-bold">Report</span>
        </a>
      </div>
      <div class="mx-auto mb-2 h-1 w-32 rounded-full bg-ink-900/80"></div>
    </nav>
  </div>
</div>

<script>
  const state = { eq:false, sev:false, photo:false };

  document.querySelectorAll('[data-group="eq"] .opt, [data-group="sev"] .opt').forEach(b => {
    b.addEventListener('click', () => {
      const group = b.parentElement.dataset.group;
      b.parentElement.querySelectorAll('.opt').forEach(x => x.classList.remove('selected'));
      b.classList.add('selected');
      state[group] = true;
      evalForm();
    });
  });

  function appendDesc(t){
    const d = document.getElementById('desc');
    d.value = d.value ? (d.value + '. ' + t) : t;
    evalForm();
  }
  function onRPhoto(e){
    const f = e.target.files && e.target.files[0]; if (!f) return;
    document.getElementById('rimg').src = URL.createObjectURL(f);
    document.getElementById('rempty').classList.add('hidden');
    document.getElementById('rprev').classList.remove('hidden');
    state.photo = true; evalForm();
  }
  function clearRPhoto(){
    document.getElementById('rprev').classList.add('hidden');
    document.getElementById('rempty').classList.remove('hidden');
    document.getElementById('rphoto').value = '';
    state.photo = false; evalForm();
  }
  function evalForm(){
    const ok = state.eq && state.sev && state.photo;
    const b = document.getElementById('rsubmit');
    b.disabled = !ok;
    b.classList.toggle('bg-ink-300', !ok);
    b.classList.toggle('bg-crit', ok);
  }
  function submitReport(){
    if (document.getElementById('rsubmit').disabled) return;
    alert('Issue raised — supervisor notified');
    location.href = 'issues.html';
  }
</script>
<script src="_components.js" defer></script>
</body>
</html>
